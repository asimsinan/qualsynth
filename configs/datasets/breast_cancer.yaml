# Breast Cancer Wisconsin Dataset Configuration

name: "breast_cancer"
description: "Breast Cancer Wisconsin dataset for cancer diagnosis"

# Dataset properties
properties:
  n_samples: 569
  n_features: 30
  n_classes: 2
  imbalance_ratio: 1.68
  minority_class: 1
  minority_class_name: "malignant"

# No sensitive attributes for this dataset
sensitive_attributes: []

# Data splits
splits:
  train: 0.60
  validation: 0.20
  test: 0.20
  stratify: true

# Random seeds for reproducibility
seeds: [42, 123, 456, 789, 1234, 2024, 3141, 4242, 5555, 6789]

# Fairness thresholds
fairness:
  dpd_threshold: 0.10
  eod_threshold: 0.10
  eo_threshold: 0.10

# Evaluation metrics
metrics:
  performance:
    - "f1"
    - "recall"
    - "precision"
    - "roc_auc"
    - "pr_auc"
    - "balanced_accuracy"
    - "mcc"
    - "g_mean"
  fairness: []

# Dataset-specific notes
notes: |
  - Small dataset (569 samples)
  - Medical domain - cancer diagnosis
  - 30 numerical features (cell nucleus measurements)
  - Low imbalance ratio (1.68:1)
  - Classic benchmark dataset

