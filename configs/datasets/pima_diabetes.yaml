# Pima Indians Diabetes Dataset Configuration

name: "pima_diabetes"
description: "Pima Indians Diabetes dataset for diabetes prediction"

# Dataset properties
properties:
  n_samples: 768
  n_features: 8
  n_classes: 2
  imbalance_ratio: 1.87
  minority_class: 1
  minority_class_name: "diabetic"

# No sensitive attributes for this dataset
sensitive_attributes: []

# Data splits
splits:
  train: 0.60
  validation: 0.20
  test: 0.20
  stratify: true

# Random seeds for reproducibility
seeds: [42, 123, 456, 789, 1234, 2024, 3141, 4242, 5555, 6789]

# Fairness thresholds
fairness:
  dpd_threshold: 0.10
  eod_threshold: 0.10
  eo_threshold: 0.10

# Evaluation metrics
metrics:
  performance:
    - "f1"
    - "recall"
    - "precision"
    - "roc_auc"
    - "pr_auc"
    - "balanced_accuracy"
    - "mcc"
    - "g_mean"
  fairness: []

# Dataset-specific notes
notes: |
  - Small dataset (768 samples)
  - Medical domain - diabetes prediction
  - 8 numerical features (health measurements)
  - Low imbalance ratio (1.87:1)
  - Classic benchmark from NIDDK

