# Thyroid Disease Dataset Configuration

name: "thyroid"
description: "Thyroid Disease dataset for predicting sick vs healthy thyroid"

# Dataset properties
properties:
  n_samples: 3772
  n_features: 28  # TBG column removed (was 100% null)
  n_classes: 2
  imbalance_ratio: 15.33
  minority_class: 1
  minority_class_name: "sick"

# No sensitive attributes for this dataset
sensitive_attributes: []

# Data splits
splits:
  train: 0.60
  validation: 0.20
  test: 0.20
  stratify: true

# Random seeds for reproducibility
seeds: [42, 123, 456, 789, 1234, 2024, 3141, 4242, 5555, 6789]

# Fairness thresholds
fairness:
  dpd_threshold: 0.10
  eod_threshold: 0.10
  eo_threshold: 0.10

# Evaluation metrics
metrics:
  performance:
    - "f1"
    - "recall"
    - "precision"
    - "roc_auc"
    - "pr_auc"
    - "balanced_accuracy"
    - "mcc"
    - "g_mean"
  fairness: []

# Dataset-specific notes
notes: |
  - Medium dataset (3772 samples)
  - Medical domain - thyroid disease diagnosis
  - 28 features (mix of lab tests and patient info)
  - High imbalance ratio (15.33:1)
  - From UCI/OpenML 'sick' dataset

