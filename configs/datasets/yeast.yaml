# Yeast Dataset Configuration

name: "yeast"
description: "Yeast dataset for predicting ME2 localization site (highly imbalanced)"

# Dataset properties
properties:
  n_samples: 1484
  n_features: 8
  n_classes: 2
  imbalance_ratio: 28.10
  minority_class: 1
  minority_class_name: "ME2"

# No sensitive attributes for this dataset
sensitive_attributes: []

# Data splits
splits:
  train: 0.60
  validation: 0.20
  test: 0.20
  stratify: true

# Random seeds for reproducibility
seeds: [42, 123, 456, 789, 1234, 2024, 3141, 4242, 5555, 6789]

# Fairness thresholds
fairness:
  dpd_threshold: 0.10
  eod_threshold: 0.10
  eo_threshold: 0.10

# Evaluation metrics
metrics:
  performance:
    - "f1"
    - "recall"
    - "precision"
    - "roc_auc"
    - "pr_auc"
    - "balanced_accuracy"
    - "mcc"
    - "g_mean"
  fairness: []

# Dataset-specific notes
notes: |
  - Small dataset (1484 samples)
  - Biology domain - protein localization
  - 8 numerical features
  - HIGH imbalance ratio (28.10:1)
  - Only 51 minority samples - challenging case

